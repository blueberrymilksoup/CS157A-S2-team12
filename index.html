<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spartan Exchange</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Spartan Exchange</h1>

        <div class="search-container">
            <div class="search-box">
                <input type="text" placeholder="Search products...">
                <button>Search</button>
            </div>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Account</a>
            <a href="#">Help</a>
            <a href="#">Cart</a>
            <span id="user-info" style="margin-left:20px;"></span>
            <a href="#" onclick="logout()" id="logout-btn" style="display:none;">Logout</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Spartan Exchange</h2>
    </section>

    <section class="products">
        <h2>Featured Products</h2>
        <div class="product-grid">

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Product 1</h3>
                <p>$19.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Product 2</h3>
                <p>$29.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Product 3</h3>
                <p>$39.99</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Product 4</h3>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Spartan Exchange. All rights reserved.</p>
    </footer>

    <script>
        const user = localStorage.getItem("loggedInUser");

        if (!user) {
            // Not logged in → send to login page
            window.location.href = "login.html";
        } else {
            // Show user email
            document.getElementById("user-info").innerText = user;
            document.getElementById("logout-btn").style.display = "inline";
        }

        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
